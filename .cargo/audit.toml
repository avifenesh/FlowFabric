# cargo-audit ignore list.
#
# Mirrors the `[advisories] ignore` list in deny.toml so a single PR
# can land an ignore in both places. Each entry MUST carry a
# justification comment matching deny.toml's.

[advisories]
ignore = [
    # RUSTSEC-2026-0097 — rand 0.8 unsoundness via custom logger +
    # `rand::rng()`. Reached transitively through
    # tower 0.4.13 → tonic 0.12.3 → opentelemetry-otlp → telemetrylib
    # → ferriskey. FlowFabric uses the default tracing subscriber
    # (no custom logger), so the trigger condition does not apply.
    # Remove when opentelemetry-otlp upgrades to tonic ≥0.13.
    "RUSTSEC-2026-0097",
    # RUSTSEC-2023-0071 — `rsa` 0.9 Marvin-attack timing sidechannel on
    # RSA private-key operations. Reached transitively through
    # sqlx-macros-core → sqlx-mysql (sqlx 0.8 compiles all DB drivers
    # into sqlx-macros unconditionally, even though we only activate
    # the `postgres` feature on our sqlx dep). FlowFabric never
    # instantiates a MySQL connection, never performs RSA operations,
    # and never exposes RSA key material. No exploit path. Remove
    # when sqlx-macros-core 0.9+ drops unused driver compilation.
    "RUSTSEC-2023-0071",
]
