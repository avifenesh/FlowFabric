name: Matrix CI

# Cross-host + cross-mode + cross-version verification.
#
# Matrix coverage (6 jobs):
#
#   linux x86_64  × valkey 8   × standalone   -> ubuntu-latest
#   linux x86_64  × valkey 8   × cluster      -> ubuntu-latest
#   linux x86_64  × valkey 7.2 × standalone   -> ubuntu-latest    (floor guard)
#   linux arm64   × valkey 8   × standalone   -> ubuntu-24.04-arm
#   linux arm64   × valkey 8   × cluster      -> ubuntu-24.04-arm
#   macos arm64   × valkey 8   × standalone   -> macos-latest
#
# **Valkey versions:** RFC-011 §13 sets the floor at Valkey >= 7.2
# (enforced at ff-server boot via `verify_valkey_version`). 7.2 is where
# Functions + RESP3 stabilized; those are the primitives we actually
# depend on. We pin major 8 as the primary coverage (cairn-fabric's
# reference deployment) and carry one 7.2 × standalone entry as a
# guard against accidental 8-specific primitive adoption. If the 7.2
# job breaks, that is a signal to either document the new dependency
# in an RFC-011 §13 amendment or fix the accidental usage.
#
# Mac arm64 validates Apple Silicon Rust correctness on Valkey 8;
# the 7.2 × mac combination is intentionally skipped because
# Homebrew does not package 7.2 and docker-on-mac on GitHub runners
# is flaky under privileged-mode requirements. x86_64 mac is NOT in
# the matrix: GitHub's Intel runner (macos-13) is EOL December 2025,
# and x86_64 Rust correctness is already validated through
# ubuntu-latest. Linux covers the full Valkey version matrix where
# we actually deploy.

on:
  # `paths-ignore` drops doc-only PRs from CI entirely (the matrix
  # never schedules). The sentinel `matrix-tests-complete` job below
  # always reports success so branch protection — which must list the
  # sentinel (NOT the matrix job directly) as required — still
  # accepts the PR. Duplicated across push + pull_request because
  # GitHub Actions does not support YAML anchors in workflow files.
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'rfcs/**'
      - 'LICENSE*'
      - 'NOTICE'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE*'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'rfcs/**'
      - 'LICENSE*'
      - 'NOTICE'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE*'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: ""

# Least-privilege default. The matrix jobs only read the repo for
# build/test; nothing here mutates status, comments, or artifacts.
permissions:
  contents: read

concurrency:
  group: matrix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  matrix:
    name: ${{ matrix.host.os }} · valkey ${{ matrix.valkey.version }} · ${{ matrix.mode }}
    runs-on: ${{ matrix.host.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        host:
          - { os: ubuntu-latest,    kind: linux, arch: x86_64 }
          - { os: ubuntu-24.04-arm, kind: linux, arch: arm64 }
          - { os: macos-latest,     kind: mac,   arch: arm64 }
        valkey:
          # Pin to major 8 (alpine variant) for primary coverage —
          # matches cairn-fabric's integration-test pin. Using a
          # major-version tag tracks patch releases automatically
          # without the drift risk of `:latest` (which could roll to
          # 9.x with breaking behavior changes).
          - { version: "8", image: "valkey/valkey:8-alpine" }
        mode: [standalone, cluster]
        exclude:
          # Mac: standalone only. docker-on-mac cluster setup is
          # unsupported on GitHub hosted runners. x86_64 mac coverage is
          # omitted — GitHub's Intel runner (macos-13) is EOL December
          # 2025; x86_64 correctness is validated through ubuntu-latest.
          - host: { os: macos-latest, kind: mac, arch: arm64 }
            mode: cluster
        include:
          # RFC-011 §13 floor-guard entry: one x86_64 linux standalone
          # job against Valkey 7.2 (the explicit floor). Purpose is to
          # detect accidental 8-specific primitive adoption — not to
          # replicate full matrix coverage. If this job starts failing,
          # either amend RFC-011 §13 to raise the floor with a specific
          # justification or fix the offending usage.
          - host: { os: ubuntu-latest, kind: linux, arch: x86_64 }
            valkey: { version: "7.2", image: "valkey/valkey:7.2" }
            mode: standalone

    steps:
      # Third-party actions pinned to commit SHAs (CodeQL
      # security-and-quality rule + supply-chain hardening). Tag
      # comments name the version each SHA points at; refresh by
      # running `gh api repos/<owner>/<repo>/git/ref/tags/<tag>` and
      # dereferencing annotated tags to commit type. If the pin lands
      # on a lightweight tag, ref/tags returns the commit directly.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable branch, 2026-03-27
        with:
          components: clippy

      - uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0  # v2.8.0
        with:
          key: ${{ matrix.host.os }}-${{ matrix.valkey.version }}-${{ matrix.mode }}

      # ── Valkey setup ──────────────────────────────────────────────

      - name: Start Valkey (linux · standalone)
        if: matrix.host.kind == 'linux' && matrix.mode == 'standalone'
        env:
          VALKEY_IMAGE: ${{ matrix.valkey.image }}
        run: |
          docker run -d --name valkey \
            -p 6379:6379 \
            --health-cmd 'valkey-cli ping' --health-interval 3s --health-retries 10 \
            "$VALKEY_IMAGE" \
            valkey-server --save "" --appendonly no
          for _ in $(seq 1 30); do
            if docker exec valkey valkey-cli ping 2>/dev/null | grep -q PONG; then
              echo "valkey ready"; break
            fi
            sleep 1
          done

      - name: Start Valkey cluster (linux)
        if: matrix.host.kind == 'linux' && matrix.mode == 'cluster'
        env:
          VALKEY_IMAGE: ${{ matrix.valkey.image }}
        # docker compose v2 auto-discovers compose.yaml / compose.yml /
        # docker-compose.yml only; our descriptive filename needs `-f`.
        run: |
          docker compose -f .github/cluster/docker-compose.cluster.yml up -d
          sudo apt-get update -qq && sudo apt-get install -yqq redis-tools
          bash .github/cluster/bootstrap.sh

      - name: Start Valkey (mac · standalone)
        if: matrix.host.kind == 'mac'
        run: |
          brew update
          brew install valkey
          valkey-server --daemonize yes --port 6379 --save "" --appendonly no
          for _ in $(seq 1 30); do
            if valkey-cli ping 2>/dev/null | grep -q PONG; then
              echo "valkey ready"; break
            fi
            sleep 1
          done

      # ── Verification steps ────────────────────────────────────────

      - name: cargo check
        run: cargo check --workspace --all-features

      - name: cargo clippy
        run: |
          cargo clippy \
            -p ff-core -p ff-script -p ff-engine -p ff-scheduler \
            -p ff-sdk -p ff-server -p ff-test \
            --features ff-sdk/direct-valkey-claim \
            -- -D warnings

      - name: cargo clippy (ferriskey, all targets, no features)
        # Ferriskey is vendored in-tree. Its test suite and benches had
        # drifted against lib changes until a dedicated cleanup pass;
        # gate them here so drift cannot recur unnoticed.
        run: cargo clippy -p ferriskey --all-targets -- -D warnings

      - name: cargo clippy (ferriskey, all targets, +iam)
        # The iam feature adds the IAMTokenManager arg to
        # StandaloneClient::create_client and the iam_config field on
        # AuthenticationInfo. Running clippy in this configuration
        # catches drift in cfg-gated paths (e.g. #[cfg(feature = "iam")]
        # init lines or test helpers) that the no-feature run cannot see.
        run: cargo clippy -p ferriskey --all-targets --features iam -- -D warnings

      - name: Unit tests
        env:
          FF_HOST: 127.0.0.1
          FF_PORT: ${{ matrix.mode == 'cluster' && '7000' || '6379' }}
          FF_CLUSTER: ${{ matrix.mode == 'cluster' && '1' || '0' }}
        run: |
          cargo test \
            -p ff-core -p ff-script -p ff-engine -p ff-scheduler \
            -p ff-sdk -p ff-server \
            --features ff-sdk/direct-valkey-claim

      # PR-94: dedicated observability run. Exercises the OTEL +
      # Prometheus code path (feature-gated; the default unit-test
      # step above keeps OTEL out of the dep tree) and the
      # integration test in crates/ff-server/tests/metrics.rs that
      # asserts /metrics text-exposition format + non-zero counter
      # samples. ~3min CI overhead, load-bearing because the
      # shim-vs-real feature skew is easy to break silently.
      - name: Unit tests (ff-server observability)
        env:
          FF_HOST: 127.0.0.1
          FF_PORT: ${{ matrix.mode == 'cluster' && '7000' || '6379' }}
          FF_CLUSTER: ${{ matrix.mode == 'cluster' && '1' || '0' }}
        run: cargo test -p ff-server --features observability

      - name: Integration tests (serial)
        env:
          FF_HOST: 127.0.0.1
          FF_PORT: ${{ matrix.mode == 'cluster' && '7000' || '6379' }}
          FF_CLUSTER: ${{ matrix.mode == 'cluster' && '1' || '0' }}
        run: |
          cargo test -p ff-test -- --test-threads=1

      # ── Diagnostics on failure ────────────────────────────────────

      - name: Dump Valkey logs (linux · standalone)
        if: failure() && matrix.host.kind == 'linux' && matrix.mode == 'standalone'
        run: docker logs valkey 2>&1 | tail -200 || true

      - name: Dump Valkey cluster logs (linux · cluster)
        if: failure() && matrix.host.kind == 'linux' && matrix.mode == 'cluster'
        run: |
          docker compose -f .github/cluster/docker-compose.cluster.yml logs --tail=80 2>&1 || true

  # Always-runs sentinel. Branch protection should list
  # `matrix-tests-complete` as the required status check — NOT the
  # per-matrix-job name — so a doc-only PR (which skips the matrix via
  # paths-ignore) still reports a green required check and can merge.
  # `needs.matrix.result` is `skipped` when the matrix was filtered out
  # by paths-ignore, `success` on a clean run, `failure` / `cancelled`
  # otherwise. `if: always()` keeps the job on the run graph even when
  # the matrix is skipped.
  # Drift check: the ff-script Lua library is checked into the crate
  # (crates/ff-script/src/flowfabric.lua + flowfabric_lua_version) so it
  # ships inside the published tarball. If someone edits lua/*.lua
  # without running scripts/gen-ff-script-lua.sh, the checked-in copy
  # goes stale. This job regenerates and diffs; any divergence fails.
  lua-drift:
    name: ff-script lua drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: regenerate flowfabric.lua
        run: scripts/gen-ff-script-lua.sh
      - name: verify no drift
        run: |
          if ! git diff --exit-code -- \
              crates/ff-script/src/flowfabric.lua \
              crates/ff-script/src/flowfabric_lua_version; then
            echo "::error::ff-script generated Lua is out of date. Run scripts/gen-ff-script-lua.sh and commit." >&2
            exit 1
          fi

  matrix-tests-complete:
    name: matrix-tests-complete
    needs: [matrix, lua-drift]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate matrix result
        env:
          MATRIX_RESULT: ${{ needs.matrix.result }}
          DRIFT_RESULT: ${{ needs.lua-drift.result }}
        run: |
          fail=0
          case "$MATRIX_RESULT" in
            success|skipped) echo "matrix: $MATRIX_RESULT — ok" ;;
            *) echo "matrix: $MATRIX_RESULT — blocking merge" >&2; fail=1 ;;
          esac
          case "$DRIFT_RESULT" in
            success|skipped) echo "lua-drift: $DRIFT_RESULT — ok" ;;
            *) echo "lua-drift: $DRIFT_RESULT — blocking merge" >&2; fail=1 ;;
          esac
          exit $fail
