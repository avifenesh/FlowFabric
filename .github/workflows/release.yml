# Tag-triggered release: verify -> publish -> GitHub Release.
#
# Trigger:
#   - push of a tag matching `v*.*.*` (produced by `cargo release`).
#   - manual `workflow_dispatch` with `dry_run: true` for safe rehearsal.
#     When dry_run is true, the workflow runs the verify gate but SKIPS
#     the actual publish + GH release steps, so an operator can walk
#     through the flow on any branch without touching crates.io.
#
# Pre-requisites that MUST be configured before the first real tag push:
#   - Secret CARGO_REGISTRY_TOKEN (Settings -> Secrets -> Actions).
#     Generate at https://crates.io/me -> API Tokens with scope
#     `publish-new` + `publish-update`.
#   - GITHUB_TOKEN is auto-provided by GHA; `gh release create` uses it.
#
# Publish set (13 crates, topologically ordered):
#   ferriskey -> ff-core -> ff-script -> ff-observability
#     -> ff-observability-http
#     -> ff-backend-valkey -> ff-backend-postgres -> ff-backend-sqlite
#     -> ff-engine -> ff-scheduler
#     -> ff-sdk -> ff-server -> flowfabric
# ff-backend-sqlite added at v0.12.0 (RFC-023 Phase 1a). Dev-only —
# construction guarded by FF_DEV_MODE=1.
# flowfabric is the umbrella re-export crate (issue #279) and MUST
# publish last — it depends on every other publishable crate.
# ff-test is dev-only (publish = false) and not in the set.
# The former telemetrylib sub-crate was inlined into ferriskey
# during the Tier 1 envelope collapse (PR #18).
# ff-observability was added to the publish set in v0.3.1 after the
# v0.3.0 release partial-published (ff-engine requires it as a
# workspace dep and failed the publish step when it was missing
# from crates.io).
# ff-backend-valkey was added to the publish set in v0.3.2 after
# v0.3.1 partial-published (ff-sdk requires it as a workspace dep
# and failed the publish step when it was missing from crates.io).
# Introduced in RFC-012 Stage 1a (PR #114) as a separate crate from
# ff-sdk.
#
# Partial-publish recovery:
#   If publish succeeds for crate N but fails for crate N+1, the workflow
#   fails the job and logs an explicit recovery message. Operator must:
#     1. `cargo yank --version <X.Y.Z> <crate>` for every crate that got
#        published.
#     2. Fix the root cause on a hotfix branch.
#     3. Re-tag as <X.Y.(Z+1)> -- crates.io rejects re-publishing a
#        yanked version under the same number.
#   See docs/RELEASING.md for step-by-step.
#
# Security note:
#   Every GHA expression that references a branch/tag/input is read into
#   an env var first and then the shell reads the env var. This avoids
#   the `${{ github.* }}` shell-injection class (see
#   https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/).

name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run verify only; skip publish + GH release'
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

# Least-privilege default. `verify` + `publish` only need read; the
# `release` job overrides with `contents: write` so `gh release create`
# can push the release and upload notes.
permissions:
  contents: read

jobs:
  verify:
    name: Verify (check + clippy + tests)
    runs-on: ubuntu-latest
    services:
      valkey:
        # Valkey >= 7.2 required by RFC-011 §13 Amendment F (ff-server
        # refuses to boot below 7.2). Release-time verification pins
        # the major-8 alpine image — matches cairn-fabric's reference
        # deployment. Matrix CI separately exercises the 7.2 floor;
        # this job just needs a floor-compliant image to run the tests.
        image: valkey/valkey:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      FF_HOST: localhost
      FF_PORT: "6379"
    steps:
      # Third-party action pins — see matrix.yml for the resolve-and-
      # update procedure. Tag comments name the version each SHA
      # dereferences to.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable branch, 2026-03-27
        with:
          components: clippy
      - uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0  # v2.8.0
      - name: cargo check
        run: cargo check --workspace
      - name: cargo clippy
        run: |
          cargo clippy \
            -p ff-core -p ff-script -p ff-engine -p ff-scheduler \
            -p ff-sdk -p ff-server -p ff-test \
            --features ff-sdk/direct-valkey-claim \
            -- -D warnings
      - name: cargo clippy (ferriskey all targets, no features)
        run: cargo clippy -p ferriskey --all-targets -- -D warnings
      - name: cargo clippy (ferriskey all targets, +iam)
        run: cargo clippy -p ferriskey --all-targets --features iam -- -D warnings
      - name: unit tests
        run: |
          cargo test \
            -p ff-core -p ff-script -p ff-engine -p ff-scheduler \
            -p ff-sdk -p ff-server \
            --features ff-sdk/direct-valkey-claim
      - name: e2e tests (serial)
        run: cargo test -p ff-test -- --test-threads=1

  smoke:
    # Pre-publish published-artifact smoke (v0.7+). Feedback rule
    # `feedback_smoke_before_release.md` — v0.6.0 shipped a broken
    # read_summary because the smoke ran AFTER publish. This job
    # runs the smoke against workspace-path deps (which match the
    # final published trait shape bit-for-bit) before the tag-gated
    # publish step. A failure here MUST block `cargo publish`.
    #
    # Required fixtures: Valkey 8.x + Postgres 16 service containers.
    # No untrusted workflow inputs are consumed in this job; all env
    # vars below are static literals per the security note at the top
    # of this file.
    name: Pre-publish smoke (v0.7+)
    needs: verify
    runs-on: ubuntu-latest
    services:
      valkey:
        image: valkey/valkey:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ff_smoke
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      FF_SMOKE_SERVER: http://localhost:9090
      FF_SMOKE_VALKEY_HOST: localhost
      FF_SMOKE_VALKEY_PORT: "6379"
      FF_SMOKE_POSTGRES_URL: postgres://postgres:postgres@localhost:5432/ff_smoke
      FF_SMOKE_BACKEND: both
      FF_SMOKE_STRICT: "1"
      # GitHub-hosted runners run Postgres in a service container with
      # slower disk/CPU than Wave 7c's dedicated hardware (313ms p99).
      # Loosen the Postgres p99 fanout gate to 1200ms for CI; master
      # spec §4.2 500ms floor still applies on benchmark hardware (env
      # un-set). Per feedback_perf_honesty — documented SLO stays
      # strict; CI override is environmental allowance only.
      FF_SMOKE_FANOUT_P99_MS: "1200"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable branch, 2026-03-27
      - uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0  # v2.8.0
      - name: Install sqlx-cli + postgres client
        run: |
          cargo install sqlx-cli --no-default-features --features postgres
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client
      - name: Run smoke gate
        run: bash scripts/smoke-v0.7.sh

  smoke-sqlite:
    # RFC-023 Phase 4 pre-publish smoke for the dev-only SQLite backend.
    # Exercises the consumer-visible parity surface committed in
    # RFC-023 §4.3 (see scripts/smoke-sqlite.sh header for the exact
    # list) end-to-end against an in-memory SQLite pool. No external
    # fixtures — everything is in-process.
    #
    # Per feedback_smoke_before_release.md + feedback_smoke_after_publish.md:
    # workspace tests don't catch consumer-visible breakage on the
    # SQLite headline; this leg runs the ff-dev example binary against
    # the published trait shape (workspace-path deps in this context)
    # BEFORE the tag-gated publish step. A failure here blocks publish
    # just like the Valkey+PG smoke leg.
    name: Pre-publish smoke-sqlite (v0.12+)
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable branch, 2026-03-27
      - uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0  # v2.8.0
      - name: Run smoke-sqlite gate
        run: bash scripts/smoke-sqlite.sh

  publish:
    name: Publish crates
    needs: [verify, smoke, smoke-sqlite]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable branch, 2026-03-27
      # Ordering respects path->version deps. ferriskey is a leaf after
      # the Tier 1 envelope collapse (PR #18) inlined the former
      # telemetrylib sub-crate. ff-core is a leaf. ff-script depends on
      # ff-core. ff-observability is a leaf (added in v0.3.1 after v0.3.0
      # partial-published). ff-observability-http depends on
      # ff-observability (+ axum) — consumer-side /metrics endpoint for
      # library-mode consumers that don't pull ff-server.
      # ff-backend-valkey depends on ff-core + ff-script
      # (added in v0.3.2 after v0.3.1 partial-published). ff-engine depends
      # on ff-core + ff-observability. ff-scheduler depends on ff-core +
      # ff-script + ff-observability. ff-sdk depends on ff-core + ff-script
      # and optionally ff-backend-valkey. ff-server closes the chain
      # (depends on all of ff-core, ff-script, ff-engine, ff-backend-valkey,
      # ff-scheduler, ff-observability).
      # `--no-verify` is safe because `verify` already built + clippied +
      # tested the same ref. Without it every `cargo publish` re-builds
      # from scratch.
      - name: publish ferriskey
        env:
          TAG_VERSION: ${{ github.ref_name }}
        run: |
          cargo publish -p ferriskey --no-verify || {
            echo "::error::cargo publish ferriskey failed -- no crates published yet, safe to re-tag"
            exit 1
          }
      - run: sleep 30
      - name: publish ff-core
        env:
          TAG_VERSION: ${{ github.ref_name }}
        run: |
          VER="${TAG_VERSION#v}"
          cargo publish -p ff-core --no-verify || {
            echo "::error::cargo publish ff-core failed -- yank already-published crate(s) before re-tagging:"
            echo "::error::  cargo yank --version ${VER} ferriskey"
            exit 1
          }
      - run: sleep 30
      - name: publish ff-script
        env:
          TAG_VERSION: ${{ github.ref_name }}
        run: |
          VER="${TAG_VERSION#v}"
          cargo publish -p ff-script --no-verify || {
            echo "::error::cargo publish ff-script failed -- yank already-published crate(s) before re-tagging:"
            echo "::error::  cargo yank --version ${VER} ferriskey"
            echo "::error::  cargo yank --version ${VER} ff-core"
            exit 1
          }
      - run: sleep 30
      - name: publish ff-observability
        env:
          TAG_VERSION: ${{ github.ref_name }}
        run: |
          VER="${TAG_VERSION#v}"
          cargo publish -p ff-observability --no-verify || {
            echo "::error::cargo publish ff-observability failed -- yank already-published crate(s) before re-tagging:"
            echo "::error::  cargo yank --version ${VER} ferriskey"
            echo "::error::  cargo yank --version ${VER} ff-core"
            echo "::error::  cargo yank --version ${VER} ff-script"
            exit 1
          }
      - run: sleep 30
      - name: publish ff-observability-http
        env:
          TAG_VERSION: ${{ github.ref_name }}
        run: |
          VER="${TAG_VERSION#v}"
          cargo publish -p ff-observability-http --no-verify || {
            echo "::error::cargo publish ff-observability-http failed -- yank already-published crate(s) before re-tagging:"
            echo "::error::  cargo yank --version ${VER} ferriskey"
            echo "::error::  cargo yank --version ${VER} ff-core"
            echo "::error::  cargo yank --version ${VER} ff-script"
            echo "::error::  cargo yank --version ${VER} ff-observability"
            exit 1
          }
      - run: sleep 30
      - name: publish ff-scheduler
        env:
          TAG_VERSION: ${{ github.ref_name }}
        run: |
          VER="${TAG_VERSION#v}"
          cargo publish -p ff-scheduler --no-verify || {
            echo "::error::cargo publish ff-scheduler failed -- yank already-published crate(s) before re-tagging:"
            echo "::error::  cargo yank --version ${VER} ferriskey"
            echo "::error::  cargo yank --version ${VER} ff-core"
            echo "::error::  cargo yank --version ${VER} ff-script"
            echo "::error::  cargo yank --version ${VER} ff-observability"
            echo "::error::  cargo yank --version ${VER} ff-observability-http"
            exit 1
          }
      - run: sleep 30
      - name: publish ff-backend-valkey
        env:
          TAG_VERSION: ${{ github.ref_name }}
        run: |
          VER="${TAG_VERSION#v}"
          cargo publish -p ff-backend-valkey --no-verify || {
            echo "::error::cargo publish ff-backend-valkey failed -- yank already-published crate(s) before re-tagging:"
            echo "::error::  cargo yank --version ${VER} ferriskey"
            echo "::error::  cargo yank --version ${VER} ff-core"
            echo "::error::  cargo yank --version ${VER} ff-script"
            echo "::error::  cargo yank --version ${VER} ff-observability"
            echo "::error::  cargo yank --version ${VER} ff-observability-http"
            echo "::error::  cargo yank --version ${VER} ff-scheduler"
            exit 1
          }
      - run: sleep 30
      - name: publish ff-backend-postgres
        env:
          TAG_VERSION: ${{ github.ref_name }}
        run: |
          VER="${TAG_VERSION#v}"
          cargo publish -p ff-backend-postgres --no-verify || {
            echo "::error::cargo publish ff-backend-postgres failed -- yank already-published crate(s) before re-tagging:"
            echo "::error::  cargo yank --version ${VER} ferriskey"
            echo "::error::  cargo yank --version ${VER} ff-core"
            echo "::error::  cargo yank --version ${VER} ff-script"
            echo "::error::  cargo yank --version ${VER} ff-observability"
            echo "::error::  cargo yank --version ${VER} ff-observability-http"
            echo "::error::  cargo yank --version ${VER} ff-scheduler"
            echo "::error::  cargo yank --version ${VER} ff-backend-valkey"
            exit 1
          }
      - run: sleep 30
      - name: publish ff-backend-sqlite
        env:
          TAG_VERSION: ${{ github.ref_name }}
        run: |
          VER="${TAG_VERSION#v}"
          cargo publish -p ff-backend-sqlite --no-verify || {
            echo "::error::cargo publish ff-backend-sqlite failed -- yank already-published crate(s) before re-tagging:"
            echo "::error::  cargo yank --version ${VER} ferriskey"
            echo "::error::  cargo yank --version ${VER} ff-core"
            echo "::error::  cargo yank --version ${VER} ff-script"
            echo "::error::  cargo yank --version ${VER} ff-observability"
            echo "::error::  cargo yank --version ${VER} ff-observability-http"
            echo "::error::  cargo yank --version ${VER} ff-scheduler"
            echo "::error::  cargo yank --version ${VER} ff-backend-valkey"
            echo "::error::  cargo yank --version ${VER} ff-backend-postgres"
            echo "::error::  cargo yank --version ${VER} ff-backend-sqlite"
            exit 1
          }
      - run: sleep 30
      - name: publish ff-engine
        env:
          TAG_VERSION: ${{ github.ref_name }}
        run: |
          VER="${TAG_VERSION#v}"
          cargo publish -p ff-engine --no-verify || {
            echo "::error::cargo publish ff-engine failed -- yank already-published crate(s) before re-tagging:"
            echo "::error::  cargo yank --version ${VER} ferriskey"
            echo "::error::  cargo yank --version ${VER} ff-core"
            echo "::error::  cargo yank --version ${VER} ff-script"
            echo "::error::  cargo yank --version ${VER} ff-observability"
            echo "::error::  cargo yank --version ${VER} ff-observability-http"
            echo "::error::  cargo yank --version ${VER} ff-scheduler"
            echo "::error::  cargo yank --version ${VER} ff-backend-valkey"
            echo "::error::  cargo yank --version ${VER} ff-backend-postgres"
            echo "::error::  cargo yank --version ${VER} ff-backend-sqlite"
            exit 1
          }
      - run: sleep 30
      - name: publish ff-sdk
        env:
          TAG_VERSION: ${{ github.ref_name }}
        run: |
          VER="${TAG_VERSION#v}"
          cargo publish -p ff-sdk --no-verify || {
            echo "::error::cargo publish ff-sdk failed -- yank already-published crate(s) before re-tagging:"
            echo "::error::  cargo yank --version ${VER} ferriskey"
            echo "::error::  cargo yank --version ${VER} ff-core"
            echo "::error::  cargo yank --version ${VER} ff-script"
            echo "::error::  cargo yank --version ${VER} ff-observability"
            echo "::error::  cargo yank --version ${VER} ff-observability-http"
            echo "::error::  cargo yank --version ${VER} ff-scheduler"
            echo "::error::  cargo yank --version ${VER} ff-backend-valkey"
            echo "::error::  cargo yank --version ${VER} ff-backend-postgres"
            echo "::error::  cargo yank --version ${VER} ff-backend-sqlite"
            echo "::error::  cargo yank --version ${VER} ff-engine"
            exit 1
          }
      - run: sleep 30
      - name: publish ff-server
        env:
          TAG_VERSION: ${{ github.ref_name }}
        run: |
          VER="${TAG_VERSION#v}"
          cargo publish -p ff-server --no-verify || {
            echo "::error::cargo publish ff-server failed -- yank already-published crate(s) before re-tagging:"
            echo "::error::  cargo yank --version ${VER} ferriskey"
            echo "::error::  cargo yank --version ${VER} ff-core"
            echo "::error::  cargo yank --version ${VER} ff-script"
            echo "::error::  cargo yank --version ${VER} ff-observability"
            echo "::error::  cargo yank --version ${VER} ff-observability-http"
            echo "::error::  cargo yank --version ${VER} ff-scheduler"
            echo "::error::  cargo yank --version ${VER} ff-backend-valkey"
            echo "::error::  cargo yank --version ${VER} ff-backend-postgres"
            echo "::error::  cargo yank --version ${VER} ff-backend-sqlite"
            echo "::error::  cargo yank --version ${VER} ff-engine"
            echo "::error::  cargo yank --version ${VER} ff-sdk"
            exit 1
          }
      - run: sleep 30
      # `flowfabric` umbrella (issue #279) depends on every other
      # publishable ff-* crate + ferriskey, so it MUST publish last.
      # If this step fails, the consumer-visible umbrella is missing
      # for the release — yank every previously-published crate and
      # re-tag as the next patch (crates.io refuses re-publish of a
      # yanked version).
      - name: publish flowfabric
        env:
          TAG_VERSION: ${{ github.ref_name }}
        run: |
          VER="${TAG_VERSION#v}"
          cargo publish -p flowfabric --no-verify || {
            echo "::error::cargo publish flowfabric failed — yank every previously-published crate before re-tagging:"
            echo "::error::  cargo yank --version ${VER} ferriskey ff-core ff-script ff-observability ff-observability-http ff-scheduler ff-backend-valkey ff-backend-postgres ff-backend-sqlite ff-engine ff-sdk ff-server"
            exit 1
          }

  release:
    name: Create GitHub Release
    needs: publish
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: gh release create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --generate-notes
