name: Security & Quality

# Six independent gates that must pass before a PR can merge.
# Each runs in parallel on ubuntu-latest; failure on any blocks merge.
#
#   audit         — cargo-audit against the RustSec advisory DB
#   deny          — cargo-deny (licenses, bans, sources, advisories)
#   geiger        — unsafe-expression ratchet vs committed baseline
#   codeql-gate   — waits on the separate CodeQL workflow (codeql.yml)
#   machete       — unused dependency detection
#   semver-checks — breaking change detection on publish-bound crates
#                   (skips gracefully until the first git tag lands)

on:
  # paths-ignore skips doc-only PRs entirely. Branch protection
  # should require `quality-gates-complete` (the sentinel at the bottom
  # of this file) rather than any individual gate job, so skipped
  # runs still report a passing required check.
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'rfcs/**'
      - 'LICENSE*'
      - 'NOTICE'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE*'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'rfcs/**'
      - 'LICENSE*'
      - 'NOTICE'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE*'

concurrency:
  group: security-quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: audit
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit (--deny warnings; ignore list in .cargo/audit.toml)
        run: cargo audit --deny warnings

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: deny
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: cargo deny check (licenses, bans, sources, advisories)
        run: cargo deny check

  geiger:
    name: cargo-geiger (unsafe ratchet)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: geiger
      - name: Install cargo-geiger
        run: cargo install cargo-geiger --locked
      - name: Verify no crate's unsafe count exceeds the committed baseline
        run: bash bin/check-geiger-baseline.sh
      - name: Summarize in job output
        if: always()
        run: |
          echo "## Unsafe-expression ratchet" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat .github/geiger-baseline.json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  codeql-gate:
    name: CodeQL gate
    runs-on: ubuntu-latest
    # Big enough to cover the slow side of CodeQL's Rust autobuild
    # (~15–25 min cold, under 5 min hot cache) plus startup overhead.
    # Keep some slack under the job timeout so polling can report the
    # timeout with a useful message before the job is hard-killed.
    timeout-minutes: 35
    # gh run list queries the Actions API; workflow-level permissions
    # only grant contents:read, which would 403. actions:read is the
    # minimum scope needed to list runs (GitHub docs: "Workflow runs"
    # REST endpoints require the actions scope).
    permissions:
      contents: read
      actions: read
    # This job exists so branch protection can gate merges on CodeQL's
    # status without changing codeql.yml's schedule triggers. It polls
    # the companion CodeQL workflow run for the same SHA and waits for
    # success. If codeql is still running past the deadline, this job
    # fails — PR author re-runs when codeql finishes.
    steps:
      - uses: actions/checkout@v4
      - name: Wait for CodeQL workflow (same SHA)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Safe: github.event.pull_request.head.sha and github.sha are
          # SHA-1 hex strings, not user-controlled text.
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          # Total deadline for CodeQL to finish: 30 min. Rust autobuild
          # in CodeQL can take 10–20 min cold and ~3 min hot; the first
          # failed run we saw capped out at 8m22s which was below the
          # steady-state runtime. Poll every 20s so we react quickly
          # without pounding the gh API — 90 polls over 30 min.
          #
          # First 2 min are an additional "scheduler grace" bucket: if
          # codeql.yml hasn't even picked up the SHA yet (race between
          # push-event scheduling and this job starting), we log it as
          # "pending scheduler" and keep waiting. Only after the main
          # deadline elapses do we fail.
          start=$(date +%s)
          deadline=$(( start + 1800 ))

          while :; do
            runs_json=$(gh run list \
              --workflow=codeql.yml \
              --commit="$HEAD_SHA" \
              --limit 1 \
              --json status,conclusion)

            # `gh run list` with no matches returns `[]`. Distinguish
            # "no run yet" from "queued/in_progress run" so the log is
            # readable when something is stuck.
            count=$(echo "$runs_json" | jq 'length')
            if [ "$count" -eq 0 ]; then
              echo "codeql @ $HEAD_SHA: no run scheduled yet (waiting for dispatcher)"
            else
              status=$(echo "$runs_json" | jq -r '.[0].status')
              conclusion=$(echo "$runs_json" | jq -r '.[0].conclusion // ""')
              echo "codeql @ $HEAD_SHA: status=$status conclusion=$conclusion"
              if [ "$status" = "completed" ]; then
                if [ "$conclusion" = "success" ]; then
                  echo "CodeQL passed"
                  exit 0
                fi
                echo "CodeQL finished with conclusion=$conclusion" >&2
                exit 1
              fi
            fi

            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "timeout waiting for CodeQL after ~30 min" >&2
              exit 1
            fi
            sleep 20
          done

  machete:
    name: cargo-machete (unused deps)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: machete
      - name: Install cargo-machete
        run: cargo install cargo-machete --locked
      - name: cargo machete (workspace members only; benches/examples excluded)
        # benches/ and examples/ are sibling to the main workspace and
        # out of scope for this gate. Their unused-dep hygiene is the
        # benchmark harness owner's and example authors' responsibility.
        run: cargo machete crates/ ferriskey

  semver-checks:
    name: cargo-semver-checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need tags to derive baseline-rev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: semver-checks
      - name: Install cargo-semver-checks
        # Version pin avoids a surprise upstream MSRV bump breaking CI
        # on a green branch. `rust-toolchain.toml` tracks `stable` (no
        # explicit version), so if cargo-semver-checks raises its MSRV
        # past whatever stable becomes, bump this pin in lockstep.
        run: cargo install cargo-semver-checks --locked --version 0.46.0
      - name: Run semver-checks on publish-bound crates
        # On a repo with no v*.*.* tag yet (pre-first-release), skip
        # with a visible note. Once a tag exists, compare against it.
        run: |
          latest_tag="$(git tag --list 'v*.*.*' --sort=-v:refname | head -n1)"
          if [ -z "$latest_tag" ]; then
            echo "::notice::No v*.*.* git tag yet — semver-checks has no baseline. Skipping until the first release tag."
            exit 0
          fi
          echo "Checking against baseline $latest_tag"
          cargo semver-checks check-release \
            --baseline-rev "$latest_tag" \
            -p ff-core -p ff-script -p ff-engine -p ff-scheduler \
            -p ff-sdk -p ff-server

  # Always-runs sentinel. Branch protection should list
  # `quality-gates-complete` as the required check — NOT the six
  # gates individually — so doc-only PRs (matched by paths-ignore)
  # still report green here and can merge. A gate that actually
  # fails will flip this job to `failure` via the `needs.*.result`
  # aggregate below.
  quality-gates-complete:
    name: quality-gates-complete
    needs: [audit, deny, geiger, codeql-gate, machete, semver-checks]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate gate results
        env:
          R_AUDIT: ${{ needs.audit.result }}
          R_DENY: ${{ needs.deny.result }}
          R_GEIGER: ${{ needs.geiger.result }}
          R_CODEQL: ${{ needs.codeql-gate.result }}
          R_MACHETE: ${{ needs.machete.result }}
          R_SEMVER: ${{ needs.semver-checks.result }}
        run: |
          fail=0
          for pair in \
              "audit:$R_AUDIT" \
              "deny:$R_DENY" \
              "geiger:$R_GEIGER" \
              "codeql-gate:$R_CODEQL" \
              "machete:$R_MACHETE" \
              "semver-checks:$R_SEMVER"; do
            name="${pair%%:*}"
            result="${pair#*:}"
            case "$result" in
              success|skipped) echo "$name: $result — ok" ;;
              *)               echo "$name: $result — blocking merge" >&2; fail=1 ;;
            esac
          done
          exit "$fail"
