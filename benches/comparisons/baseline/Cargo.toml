[workspace]
resolver = "3"
members = ["."]

[package]
name = "ff-bench-baseline"
version = "0.1.0"
edition = "2024"
publish = false
license = "Apache-2.0"

[[bin]]
name = "baseline-scenario1"
path = "src/scenario1.rs"

[dependencies]
redis = { version = "1", default-features = false, features = ["tokio-comp", "aio"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time", "signal", "sync"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4"] }
anyhow = "1"
clap = { version = "4", features = ["derive", "env"] }

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
