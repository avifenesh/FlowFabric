[workspace]
resolver = "3"
members = ["."]

[package]
name = "ff-bench-wider"
version = "0.1.0"
edition = "2024"
publish = false
license = "Apache-2.0"

# Wider-workload perf investigation — ferriskey vs redis-rs across 5
# workloads (80/20 GET/SET, 50/50, 100% GET, 100-cmd pipeline, streams).
# Sits alongside `baseline/` (redis-rs scenario 1) and
# `ferriskey-baseline/` (ferriskey scenario 1) but broadens the
# comparison so a single data point (BLMPOP-heavy scenario 1) doesn't
# carry the headline.
#
# Two bins per workload — one per client — trivially side-by-side so
# a reviewer can eyeball both hot loops without an abstraction layer
# in the way. Shared code (payload generation, percentiles, report
# writer) lives in a small `shared` module imported by each bin.
#
# Scaffold-only at Cargo.toml commit time: only the 80/20 pair is in
# src/bin now. 50/50, 100% GET, pipeline, and streams land in Phase 2.

[[bin]]
name = "wider-ferriskey-80-20"
path = "src/bin/ferriskey_80_20.rs"

[[bin]]
name = "wider-redis-80-20"
path = "src/bin/redis_80_20.rs"

[[bin]]
name = "wider-ferriskey-50-50"
path = "src/bin/ferriskey_50_50.rs"

[[bin]]
name = "wider-redis-50-50"
path = "src/bin/redis_50_50.rs"

[[bin]]
name = "wider-ferriskey-get"
path = "src/bin/ferriskey_get.rs"

[[bin]]
name = "wider-redis-get"
path = "src/bin/redis_get.rs"

[[bin]]
name = "wider-ferriskey-pipeline"
path = "src/bin/ferriskey_pipeline.rs"

[[bin]]
name = "wider-redis-pipeline"
path = "src/bin/redis_pipeline.rs"

[[bin]]
name = "wider-ferriskey-streams"
path = "src/bin/ferriskey_streams.rs"

[[bin]]
name = "wider-redis-streams"
path = "src/bin/redis_streams.rs"

# ──────────────────────────────────────────────────────────────
# Round 2: cluster + TLS bins (ElastiCache target). Twelve bins
# total — the 5 wider workloads + scenario-1 BLMPOP, × 2 clients.
# All reach the cluster config-endpoint over TLS and keep keys in
# a single slot via the '{wider}' / '{benchq}' hash tag, so the
# numbers measure client-in-cluster-mode + TLS cost rather than
# cross-slot routing. Cross-slot is a separate bonus bin (see
# report §4) and out of scope for this round.
# ──────────────────────────────────────────────────────────────

[[bin]]
name = "cluster-ferriskey-80-20"
path = "src/bin/cluster_ferriskey_80_20.rs"

[[bin]]
name = "cluster-redis-80-20"
path = "src/bin/cluster_redis_80_20.rs"

[[bin]]
name = "cluster-ferriskey-50-50"
path = "src/bin/cluster_ferriskey_50_50.rs"

[[bin]]
name = "cluster-redis-50-50"
path = "src/bin/cluster_redis_50_50.rs"

[[bin]]
name = "cluster-ferriskey-get"
path = "src/bin/cluster_ferriskey_get.rs"

[[bin]]
name = "cluster-redis-get"
path = "src/bin/cluster_redis_get.rs"

[[bin]]
name = "cluster-ferriskey-pipeline"
path = "src/bin/cluster_ferriskey_pipeline.rs"

[[bin]]
name = "cluster-redis-pipeline"
path = "src/bin/cluster_redis_pipeline.rs"

[[bin]]
name = "cluster-ferriskey-streams"
path = "src/bin/cluster_ferriskey_streams.rs"

[[bin]]
name = "cluster-redis-streams"
path = "src/bin/cluster_redis_streams.rs"

[[bin]]
name = "cluster-ferriskey-blmpop"
path = "src/bin/cluster_ferriskey_blmpop.rs"

[[bin]]
name = "cluster-redis-blmpop"
path = "src/bin/cluster_redis_blmpop.rs"

[dependencies]
# Report-schema + metadata helpers stay consistent with baseline/ and
# ferriskey-baseline/ — any aggregator that walks benches/results/
# treats all three the same way.
ff-bench = { path = "../../harness" }
ferriskey = { path = "../../../ferriskey" }
redis = { version = "1", default-features = false, features = [
    "tokio-comp",
    "aio",
    # Cluster + TLS for the cluster-* bins added in round 2. The
    # non-cluster bins pay zero runtime cost for these features — they
    # just bring their deps into the build.
    "cluster",
    "cluster-async",
    "tls-rustls",
    "tokio-rustls-comp",
    # webpki-roots ships a bundled Mozilla trust store so cluster bins
    # build the same on any CI image regardless of /etc/ssl state.
    # This is what the report consumer will want to reproduce.
    "tls-rustls-webpki-roots",
] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time", "signal", "sync"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
clap = { version = "4", features = ["derive", "env"] }
hdrhistogram = "7"
# Same PRNG the other bench bins use — a seeded StdRng gives
# deterministic per-worker key draws across runs.
rand = "0.10"
# Round 2 cluster+TLS requires a process-wide rustls CryptoProvider
# to be installed before any TLS connection. `aws-lc-rs` matches
# ferriskey's own rustls config (ferriskey/Cargo.toml pins
# rustls = { features = ["aws-lc-rs"] }) so both clients share one
# provider and the comparison is apples-to-apples on TLS primitives.
# Without this, redis-rs's get_async_connection panics inside rustls
# with "Could not automatically determine the process-level
# CryptoProvider from Rustls crate features."
rustls = { version = "0.23", default-features = false, features = ["aws-lc-rs", "std"] }

[profile.release]
# Match the other bench packages: debug symbols kept so perf/flame
# reports resolve inline frames, lto off so rebuild time stays small
# while the headline numbers are still on an optimised codegen path.
debug = 1
lto = "off"
