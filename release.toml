# LINT-PUBLISH-LIST:BEGIN
# Structured, machine-readable source of truth for the publishable
# crate set. Parsed by `tools/publish-list-lint` and cross-checked
# against `.github/workflows/release.yml` + `docs/RELEASING.md`.
#
# Format: one `# LINT-PUBLISH-LIST-CRATE: <name>` line per publishable
# crate, in publish (topological) order. Do NOT reorder without also
# updating release.yml and RELEASING.md in the same PR.
# See feedback_release_publish_list_drift.md — v0.3.0/v0.3.1 failed
# twice from this drift; the lint guards against a third occurrence.
# LINT-PUBLISH-LIST-CRATE: ferriskey
# LINT-PUBLISH-LIST-CRATE: ff-core
# LINT-PUBLISH-LIST-CRATE: ff-script
# LINT-PUBLISH-LIST-CRATE: ff-observability
# LINT-PUBLISH-LIST-CRATE: ff-observability-http
# LINT-PUBLISH-LIST-CRATE: ff-scheduler
# LINT-PUBLISH-LIST-CRATE: ff-backend-valkey
# LINT-PUBLISH-LIST-CRATE: ff-backend-postgres
# LINT-PUBLISH-LIST-CRATE: ff-backend-sqlite
# LINT-PUBLISH-LIST-CRATE: ff-engine
# LINT-PUBLISH-LIST-CRATE: ff-sdk
# LINT-PUBLISH-LIST-CRATE: ff-server
# LINT-PUBLISH-LIST-CRATE: flowfabric
# LINT-PUBLISH-LIST:END

# cargo-release config for FlowFabric workspace.
#
# This config drives `cargo release <level>` to perform a consolidated,
# workspace-wide version bump across the publishable crates:
#   ferriskey, ff-core, ff-script, ff-observability,
#   ff-observability-http, ff-scheduler, ff-backend-valkey,
#   ff-backend-postgres, ff-backend-sqlite, ff-engine, ff-sdk,
#   ff-server, flowfabric
# (flowfabric is the umbrella re-export crate added in v0.8.2 per
# issue #279 — it depends on every other publishable crate and
# publishes LAST in .github/workflows/release.yml.)
# (ff-scheduler must publish BEFORE ff-backend-valkey per RFC-017
# Stage C — ff-backend-valkey owns Arc<ff_scheduler::Scheduler>.)
# The former telemetrylib sub-crate was inlined into ferriskey in
# PR #18; it is no longer a separate publish target. ff-observability
# was added to the publish set in v0.3.1 after v0.3.0
# partial-published. ff-backend-valkey was added to the publish set
# in v0.3.2 after v0.3.1 partial-published (ff-sdk depends on it).
# ff-observability-http was added alongside its introduction as a
# consumer-side /metrics endpoint (axum bridge on top of
# ff-observability); ff-server keeps its own built-in /metrics route
# per PR #94.
#
# Intentionally excluded from the bump (via [package.metadata.release]
# release = false in each crate's Cargo.toml):
#   ff-test — dev-only integration harness (publish = false)
#
# cargo-release only prepares the release locally. It does NOT push and does
# NOT publish to crates.io — the tag-triggered `.github/workflows/release.yml`
# workflow runs the actual publish after CI green-gates.
#
# Typical release flow:
#   1. `cargo release <patch|minor|major> --execute`  (on a release branch)
#   2. Review the bump commit + tag locally.
#   3. `git push` the branch and the tag.
#   4. GHA workflow runs on the tag → verify → publish → create GH Release.

# ── Workspace coordination ─────────────────────────────────────────────────

# All publishable crates bump to the same version together. Without this,
# cargo-release treats each member independently.
shared-version      = true

# One commit for the workspace bump + one tag for the workspace. Avoids N
# separate commits/tags per crate. (Push consolidation is implicit — we
# disable `push` entirely below, so nothing to consolidate.)
consolidate-commits = true

# ── Tag ────────────────────────────────────────────────────────────────────

# Root-level tag `v0.1.0` — no per-crate prefix. Matches the workflow's
# `tags: [v*.*.*]` trigger glob.
tag-name     = "v{{version}}"
tag-message  = "Release v{{version}}"
tag-prefix   = ""

# ── Commit ─────────────────────────────────────────────────────────────────

pre-release-commit-message = "chore(release): v{{version}}"

# ── What cargo-release must NOT do ─────────────────────────────────────────

# Publishing is the workflow's job. cargo-release must stop after the local
# bump + commit + tag so the operator can inspect before pushing.
publish = false

# Never push automatically. Operator reviews then pushes the branch + tag.
push = false

# ── Safety ─────────────────────────────────────────────────────────────────

# Refuse to run if the working tree has uncommitted changes or if the branch
# isn't up to date with its upstream. Both default to true; kept explicit for
# the reader.
allow-branch    = ["main", "release/*"]
